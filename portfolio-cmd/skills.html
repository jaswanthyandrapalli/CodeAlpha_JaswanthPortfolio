<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Terminal Skills</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
darkMode: 'class'
}
</script>

<style>

body{
font-family: serif;
}

/* progress animation */

@keyframes load{
from{width:0}
}

.html{animation:load 1.8s forwards;width:95%}
.css{animation:load 1.8s forwards;width:88%}
.js{animation:load 1.8s forwards;width:85%}
.bootstrap{animation:load 1.8s forwards;width:90%}
.react{animation:load 1.8s forwards;width:78%}

</style>

</head>

<body class="bg-white dark:bg-[#111828] flex items-center justify-center min-h-screen text-gray-800 dark:text-gray-300">

<!-- Dark Mode Button -->
<button id="darkToggle" class="fixed top-5 right-5 text-xl">
🌙
</button>

<!-- TERMINAL WINDOW -->

<div class="w-full max-w-4xl rounded-2xl shadow-2xl border border-gray-300 dark:border-gray-800">

<!-- HEADER -->

<div class="bg-gray-100 dark:bg-[#111828] rounded-t-2xl flex items-center justify-between px-6 py-3 border-b border-gray-300 dark:border-gray-800">

<div class="flex gap-2">
<div class="w-3 h-3 bg-red-500 rounded-full"></div>
<div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
<div class="w-3 h-3 bg-green-500 rounded-full"></div>
</div>

<p class="text-lg font-semibold">
기술
</p>

</div>


<!-- BODY -->

<div class="p-8 space-y-6">

<p class="text-green-600 dark:text-green-400">{skills.sh}</p>

<p class="text-gray-600 dark:text-gray-400">../loading developer skills...</p>


<!-- SKILLS -->

<div class="space-y-5">

<!-- HTML -->
<div>

<div class="flex justify-between text-red-500 text-sm mb-1">
<span>$HTML5</span>
<span class="text-green-600 dark:text-green-400">95%</span>
</div>

<div class="w-full bg-gray-200 dark:bg-gray-800 h-2 rounded">
<div class="bg-gradient-to-r from-sky-400 to-blue-500 h-2 rounded html"></div>
</div>

</div>

<!-- CSS -->
<div>

<div class="flex justify-between text-red-500 text-sm mb-1">
<span>$CSS3 / SCSS</span>
<span class="text-green-600 dark:text-green-400">88%</span>
</div>

<div class="w-full bg-gray-200 dark:bg-gray-800 h-2 rounded">
<div class="bg-gradient-to-r from-sky-400 to-blue-500 h-2 rounded css"></div>
</div>

</div>

<!-- JS -->
<div>

<div class="flex justify-between text-red-500 text-sm mb-1">
<span>JavaScript (ES6+)</span>
<span class="text-green-600 dark:text-green-400">85%</span>
</div>

<div class="w-full bg-gray-200 dark:bg-gray-800 h-2 rounded">
<div class="bg-gradient-to-r from-sky-400 to-blue-500 h-2 rounded js"></div>
</div>

</div>

<!-- Tailwind -->
<div>

<div class="flex justify-between text-red-500 text-sm mb-1">
<span>Tailwind CSS</span>
<span class="text-green-600 dark:text-green-400">90%</span>
</div>

<div class="w-full bg-gray-200 dark:bg-gray-800 h-2 rounded">
<div class="bg-gradient-to-r from-sky-400 to-blue-500 h-2 rounded bootstrap"></div>
</div>

</div>

<!-- React -->
<div>

<div class="flex justify-between text-red-500 text-sm mb-1">
<span>React.js</span>
<span class="text-green-600 dark:text-green-400">78%</span>
</div>

<div class="w-full bg-gray-200 dark:bg-gray-800 h-2 rounded">
<div class="bg-gradient-to-r from-sky-400 to-blue-500 h-2 rounded react"></div>
</div>

</div>

</div>


<p class="text-green-600 dark:text-green-400 pt-2">
../skills loaded successfully ✔
</p>


<!-- TOOLS -->

<p class="text-green-600 dark:text-green-400 pt-4">
../tools --list
</p>


<div class="grid grid-cols-3 gap-4 pt-3">

<div class="bg-[#161a21] text-white p-4 rounded-lg text-center border border-gray-800
transform transition duration-300 ease-in-out
hover:scale-105 hover:-translate-y-1 hover:border-sky-500 hover:shadow-lg hover:shadow-sky-500/20">
Git
</div>

<div class="bg-[#161a21] text-white p-4 rounded-lg text-center border border-gray-800
transform transition duration-300 ease-in-out
hover:scale-105 hover:-translate-y-1 hover:border-sky-500 hover:shadow-lg hover:shadow-sky-500/20">
GitHub
</div>

<div class="bg-[#161a21] text-white p-4 rounded-lg text-center border border-gray-800
transform transition duration-300 ease-in-out
hover:scale-105 hover:-translate-y-1 hover:border-sky-500 hover:shadow-lg hover:shadow-sky-500/20">
VS Code
</div>

<div class="bg-[#161a21] text-white p-4 rounded-lg text-center border border-gray-800
transform transition duration-300 ease-in-out
hover:scale-105 hover:-translate-y-1 hover:border-sky-500 hover:shadow-lg hover:shadow-sky-500/20">
Vercel
</div>

<div class="bg-[#161a21] text-white p-4 rounded-lg text-center border border-gray-800
transform transition duration-300 ease-in-out
hover:scale-105 hover:-translate-y-1 hover:border-sky-500 hover:shadow-lg hover:shadow-sky-500/20">
Firebase
</div>

<div class="bg-[#161a21] text-white p-4 rounded-lg text-center border border-gray-800
transform transition duration-300 ease-in-out
hover:scale-105 hover:-translate-y-1 hover:border-sky-500 hover:shadow-lg hover:shadow-sky-500/20">
REST API
</div>

</div>

<p class="text-green-600 dark:text-green-400 pt-6">
➜ ~ System ready.
</p>

</div>

</div>

<script src="../about-me/script.js"></script>

</body>
</html>
