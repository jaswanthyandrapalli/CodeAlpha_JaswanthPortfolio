<style>

:root{
--red:#3b82f6;
--angle:0deg;
}

html{
scroll-behavior: smooth;
}

body{
font-family:'JetBrains Mono', monospace;
position:relative;
}

/* CRT Scanlines */
body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(0,0,0,0.08),
rgba(0,0,0,0.08) 1px,
transparent 1px,
transparent 2px
);
pointer-events:none;
z-index:999;
will-change:transform;
}

/* Noise texture */
body::after{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url('data:image/svg+xml,%3Csvg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2"/%3E%3C/filter%3E%3Crect width="400" height="400" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
pointer-events:none;
z-index:998;
}

/* Enhanced keyframe animations */
@keyframes slideInLeft{
from{
opacity:0;
transform:translateX(-40px) rotateZ(-2deg);
}
to{
opacity:1;
transform:translateX(0) rotateZ(0deg);
}
}

@keyframes slideInRight{
from{
opacity:0;
transform:translateX(40px) rotateZ(2deg);
}
to{
opacity:1;
transform:translateX(0) rotateZ(0deg);
}
}

@keyframes scaleReveal{
from{
opacity:0;
transform:scale(0.85) translateY(20px);
}
to{
opacity:1;
transform:scale(1) translateY(0);
}
}

@keyframes progressFill{
from{
width:0;
opacity:0;
background-position:0% 0%;
}
to{
width:100%;
opacity:1;
background-position:100% 100%;
}
}

@keyframes pulseGlow{
0%{
box-shadow:0 0 0 0 rgba(59,130,246,0.7);
}
50%{
box-shadow:0 0 0 10px rgba(59,130,246,0);
}
100%{
box-shadow:0 0 0 0 rgba(59,130,246,0);
}
}

@keyframes fadeInUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Progress animation */

@keyframes load{
from{width:0}
}

.html{animation:load 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;width:95%}
.css{animation:load 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.1s;width:88%}
.js{animation:load 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.2s;width:85%}
.bootstrap{animation:load 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.3s;width:90%}
.react{animation:load 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.4s;width:78%}
.python{animation:load 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.5s;width:80%}

/* Glitch animations */
@keyframes glitch{
0%{transform:translateX(0);}
25%{transform:translateX(-2px);}
50%{transform:translateX(2px);}
75%{transform:translateX(-1px);}
100%{transform:translateX(0);}
}

@keyframes glitch2{
0%{transform:translateX(0);}
25%{transform:translateX(2px);}
50%{transform:translateX(-2px);}
75%{transform:translateX(1px);}
100%{transform:translateX(0);}
}

/* Spin animation for border runner */
@keyframes spin{
from{ --angle:0deg; }
to{ --angle:360deg; }
}

/* Skill section animations */
.skill-section{
opacity:0;
transform:translateY(30px);
animation:fadeInUp 0.8s ease-out forwards;
}

.skill-section:nth-child(1){
animation-delay:0.1s;
}

.skill-section:nth-child(2){
animation-delay:0.2s;
}

.skill-section:nth-child(3){
animation-delay:0.3s;
}

.skill-section:nth-child(4){
animation-delay:0.4s;
}

.skill-section:nth-child(5){
animation-delay:0.5s;
}

.skill-section:nth-child(6){
animation-delay:0.6s;
}

/* Progress bar styling */
.progress-bar{
position:relative;
overflow:visible;
}

.progress-bar::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent 0%,
rgba(255,255,255,0.3) 50%,
transparent 100%
);
border-radius:9999px;
animation:shimmer 2s infinite;
}

@keyframes shimmer{
0%{transform:translateX(-100%);}
100%{transform:translateX(100%);}
}

/* Skill label styling */
.skill-label{
display:inline-block;
transition:all 0.3s ease;
}

.skill-label:hover{
transform:translateX(5px);
color:#3b82f6;
text-shadow:0 0 10px rgba(59,130,246,0.5);
}

/* Stagger reveal animation */
.tool-card{
opacity:0;
transform:translateY(25px);
animation:none;
will-change:transform,opacity;
}

.tool-card.revealed{
opacity:1;
transform:translateY(0);
animation:fadeInUp 0.6s ease-out forwards;
}

/* Enhanced tool card styles */
.tool-card{
position:relative;
overflow:hidden;
transition:all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
border:2px solid rgba(59,130,246,0.3);
}

.tool-card::before{
content:'';
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:conic-gradient(
from var(--angle,0deg),
transparent 0deg,
var(--red) 40deg,
rgba(59,130,246,0.8) 60deg,
transparent 80deg
);
opacity:0;
transition:opacity 0.3s;
animation:none;
border-radius:8px;
}

.tool-card.active::before{
content:'';
position:absolute;
inset:0;
background:conic-gradient(
from var(--angle,0deg),
transparent 0deg,
var(--red) 40deg,
rgba(59,130,246,0.8) 60deg,
transparent 80deg
);
opacity:1;
animation:spin 2s linear infinite;
pointer-events:none;
border-radius:8px;
}

.tool-card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 20px 40px rgba(59,130,246,0.2), 0 0 20px rgba(59,130,246,0.3);
border-color:var(--red);
}

.tool-card:hover::before{
opacity:0.5;
animation:spin 2s linear infinite;
}

/* Enhanced terminal window */
.terminal{
position:relative;
overflow:hidden;
transition:all 0.4s ease;
border-color:#3b82f6;
box-shadow:0 0 20px rgba(59,130,246,0.1);
}

.terminal:hover{
box-shadow:0 0 30px rgba(59,130,246,0.2);
border-color:var(--red);
}

</style>

</head>

<script>

/* Reveal animation with stagger */

const toolCards=document.querySelectorAll(".tool-card")
let animationDelay=0;

const observer=new IntersectionObserver((entries)=>{
entries.forEach((entry,idx)=>{
if(entry.isIntersecting){
const card=entry.target;
setTimeout(()=>{
card.classList.add("revealed");
observer.unobserve(card);
},idx*120);
}
})
})

toolCards.forEach(card=>{
observer.observe(card)
})


/* Auto-cycling active card highlight */

let currentActiveIndex=0;
let cycleInterval;
let isUserHovering=false;

function setActiveCard(index){
toolCards.forEach((card,idx)=>{
if(idx===index){
card.classList.add("active");
} else {
card.classList.remove("active");
}
})
currentActiveIndex=index;
}

function startCycle(){
cycleInterval=setInterval(()=>{
if(!isUserHovering){
currentActiveIndex=(currentActiveIndex+1)%toolCards.length;
setActiveCard(currentActiveIndex);
}
},1800); // 1.8 seconds per card
}

function stopCycle(){
clearInterval(cycleInterval);
}

// Start the cycling animation
startCycle();

// Hover events to interrupt cycle
toolCards.forEach((card,idx)=>{
card.addEventListener("mouseenter",()=>{
isUserHovering=true;
stopCycle();
setActiveCard(idx);
});

card.addEventListener("mouseleave",()=>{
isUserHovering=false;
currentActiveIndex=idx;
startCycle();
});
});

</script>
